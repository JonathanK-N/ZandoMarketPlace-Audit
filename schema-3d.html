<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>ZandoMarketPlace — Schéma 3D de la base de données</title>
<style>
  html, body { margin: 0; padding: 0; overflow: hidden; background: radial-gradient(circle at 50% 30%, #0f1024 0%, #05050c 70%); font-family: 'Segoe UI', Arial, sans-serif; }
  #scene { position: fixed; top: 0; left: 0; width: 100%; height: 100%; }

  #overlay {
    position: fixed; top: 0; left: 0; width: 100%; pointer-events: none;
    padding: 22px 28px; box-sizing: border-box; color: #eef0ff;
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  #title-block h1 {
    margin: 0; font-size: 22px; letter-spacing: 0.5px;
    background: linear-gradient(90deg, #f72585, #4cc9f0, #fbbf24);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    animation: shimmer 6s linear infinite;
    background-size: 200% auto;
  }
  @keyframes shimmer { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
  #title-block p { margin: 4px 0 0; font-size: 12.5px; color: #9aa0c3; }

  #legend {
    pointer-events: auto;
    background: rgba(15,16,36,0.65); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px; padding: 12px 16px; font-size: 12.5px; backdrop-filter: blur(6px);
  }
  #legend div { display: flex; align-items: center; margin: 4px 0; }
  #legend span.dot { width: 11px; height: 11px; border-radius: 50%; margin-right: 8px; box-shadow: 0 0 8px currentColor; }

  #hint {
    position: fixed; bottom: 18px; left: 28px; color: #7d83ad; font-size: 12px;
    pointer-events: none; animation: fade-in-up 1s ease;
  }
  @keyframes fade-in-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  #tooltip {
    position: fixed; pointer-events: none; display: none;
    background: rgba(10,11,26,0.92); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px; padding: 12px 14px; min-width: 200px; max-width: 280px;
    color: #eef0ff; font-size: 12.5px; box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    transition: opacity 0.12s ease; z-index: 10;
  }
  #tooltip h3 { margin: 0 0 6px; font-size: 14px; }
  #tooltip .app-tag { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 999px; margin-bottom: 8px; opacity: 0.9; }
  #tooltip ul { margin: 0; padding-left: 16px; }
  #tooltip li { margin: 2px 0; color: #c4c8e8; }
  #tooltip .fk { color: #ffd166; }

  #loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    color: #eef0ff; font-size: 14px; letter-spacing: 1px; z-index: 20;
    background: #05050c;
  }
  #loading .spinner {
    width: 34px; height: 34px; border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.15); border-top-color: #f72585;
    animation: spin 0.9s linear infinite; margin-right: 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading .row { display: flex; align-items: center; }
</style>
</head>
<body>

<div id="loading"><div class="row"><div class="spinner"></div>Construction du graphe 3D du schéma…</div></div>

<div id="overlay">
  <div id="title-block">
    <h1>🛒 ZandoMarketPlace — Schéma 3D</h1>
    <p>23 tables · 27 relations · généré depuis les modèles Django réels</p>
  </div>
  <div id="legend">
    <div><span class="dot" style="color:#4cc9f0;background:#4cc9f0"></span>accounts</div>
    <div><span class="dot" style="color:#f72585;background:#f72585"></span>products</div>
    <div><span class="dot" style="color:#4ade80;background:#4ade80"></span>orders</div>
    <div><span class="dot" style="color:#fbbf24;background:#fbbf24"></span>payments</div>
  </div>
</div>

<div id="hint">🖱️ Glisser pour orbiter · Molette pour zoomer · Survoler une table pour voir ses champs</div>
<div id="tooltip"></div>
<div id="scene"></div>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
/* ===========================================================
   DONNÉES DU SCHÉMA — extraites des modèles Django réels
   =========================================================== */
const APP_COLORS = {
  accounts: 0x4cc9f0,
  products: 0xf72585,
  orders:   0x4ade80,
  payments: 0xfbbf24,
};

const NODES = [
  { id: "User", app: "accounts", fields: ["username", "email", "user_type", "phone", "country", "city"] },
  { id: "ClientProfile", app: "accounts", fields: ["address", "loyalty_points", "→ user: User"] },
  { id: "SellerProfile", app: "accounts", fields: ["business_name", "business_email", "is_verified", "→ user: User"] },
  { id: "AdminProfile", app: "accounts", fields: ["can_manage_users", "can_manage_payments", "→ user: User"] },

  { id: "Category", app: "products", fields: ["name", "slug", "is_active", "is_daily", "→ parent: Category (self)"] },
  { id: "Color", app: "products", fields: ["name", "hex_code"] },
  { id: "Size", app: "products", fields: ["name"] },
  { id: "Product", app: "products", fields: ["title", "price", "discount_percent", "stock", "is_approved", "→ owner: User", "→ category: Category"] },
  { id: "ProductVariant", app: "products", fields: ["price", "discount_percent", "stock", "→ product: Product", "→ color: Color", "→ size: Size"] },
  { id: "VariantImage", app: "products", fields: ["image", "→ variant: ProductVariant"] },
  { id: "DigitalProduct", app: "products", fields: ["file", "license_key", "→ product: Product (1:1)"] },
  { id: "Ad", app: "products", fields: ["title", "priority", "clicks", "views", "→ product: Product"] },
  { id: "CarouselSlide", app: "products", fields: ["title", "image", "priority"] },
  { id: "ProductImage", app: "products", fields: ["image", "is_main", "→ product: Product"] },
  { id: "ProductReview", app: "products", fields: ["rating", "liked", "→ product: Product", "→ user: User"] },
  { id: "Wishlist", app: "products", fields: ["created_at", "→ user: User (1:1)"] },
  { id: "WishlistItem", app: "products", fields: ["added_at", "→ wishlist: Wishlist", "→ product: Product"] },
  { id: "ProductView", app: "products", fields: ["viewed_at", "→ user: User", "→ product: Product"] },

  { id: "Cart", app: "orders", fields: ["created_at", "→ user: User"] },
  { id: "CartItem", app: "orders", fields: ["quantity", "→ cart: Cart", "→ product: Product"] },
  { id: "Order", app: "orders", fields: ["total", "status", "shipping_address", "→ user: User"] },
  { id: "OrderItem", app: "orders", fields: ["price", "quantity", "→ order: Order", "→ product: Product"] },

  { id: "Payment", app: "payments", fields: ["amount", "method", "success", "→ user: User"] },
];

const EDGES = [
  ["ClientProfile","User"], ["SellerProfile","User"], ["AdminProfile","User"],
  ["Product","User"], ["Product","Category"],
  ["ProductVariant","Product"], ["ProductVariant","Color"], ["ProductVariant","Size"],
  ["VariantImage","ProductVariant"], ["DigitalProduct","Product"],
  ["Ad","Product"], ["ProductImage","Product"],
  ["ProductReview","Product"], ["ProductReview","User"],
  ["Wishlist","User"], ["WishlistItem","Wishlist"], ["WishlistItem","Product"],
  ["ProductView","User"], ["ProductView","Product"],
  ["Cart","User"], ["CartItem","Cart"], ["CartItem","Product"],
  ["Order","User"], ["OrderItem","Order"], ["OrderItem","Product"],
  ["Payment","User"],
];

/* ===========================================================
   FORCE-DIRECTED 3D LAYOUT (mini simulation maison)
   =========================================================== */
const CLUSTER_ANCHORS = {
  accounts: new THREE.Vector3(-420, 60, -60),
  products: new THREE.Vector3(0, 0, 0),
  orders:   new THREE.Vector3(360, -180, 220),
  payments: new THREE.Vector3(320, 240, -260),
};

NODES.forEach(n => {
  const a = CLUSTER_ANCHORS[n.app];
  n.pos = new THREE.Vector3(
    a.x + (Math.random()-0.5)*160,
    a.y + (Math.random()-0.5)*160,
    a.z + (Math.random()-0.5)*160
  );
  n.vel = new THREE.Vector3();
});

const byId = {};
NODES.forEach(n => byId[n.id] = n);

function simulate(iterations) {
  for (let it = 0; it < iterations; it++) {
    NODES.forEach(n => n.force = new THREE.Vector3());

    // répulsion entre toutes les paires
    for (let i = 0; i < NODES.length; i++) {
      for (let j = i+1; j < NODES.length; j++) {
        const a = NODES[i], b = NODES[j];
        const diff = a.pos.clone().sub(b.pos);
        let dist = diff.length();
        if (dist < 1) dist = 1;
        const strength = 9000 / (dist*dist);
        diff.normalize().multiplyScalar(strength);
        a.force.add(diff);
        b.force.sub(diff);
      }
    }

    // ressort le long des relations
    EDGES.forEach(([s,t]) => {
      const a = byId[s], b = byId[t];
      const diff = b.pos.clone().sub(a.pos);
      const dist = Math.max(diff.length(), 1);
      const target = 140;
      const strength = (dist - target) * 0.02;
      diff.normalize().multiplyScalar(strength);
      a.force.add(diff);
      b.force.sub(diff);
    });

    // rappel vers l'ancre du cluster
    NODES.forEach(n => {
      const a = CLUSTER_ANCHORS[n.app];
      const pull = a.clone().sub(n.pos).multiplyScalar(0.01);
      n.force.add(pull);
    });

    NODES.forEach(n => {
      n.vel.add(n.force).multiplyScalar(0.78);
      n.pos.add(n.vel);
    });
  }
}
simulate(260);

/* ===========================================================
   THREE.JS SCENE
   =========================================================== */
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x05050c, 0.0011);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 1, 5000);
camera.position.set(0, 120, 950);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.getElementById('scene').appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.55;

scene.add(new THREE.AmbientLight(0x8888ff, 0.55));
const pointLight = new THREE.PointLight(0xffffff, 1.1, 3000);
pointLight.position.set(300, 400, 600);
scene.add(pointLight);
const pointLight2 = new THREE.PointLight(0xf72585, 0.6, 3000);
pointLight2.position.set(-400, -200, -300);
scene.add(pointLight2);

// starfield léger
{
  const starGeo = new THREE.BufferGeometry();
  const starCount = 800;
  const positions = new Float32Array(starCount*3);
  for (let i=0; i<starCount; i++){
    positions[i*3] = (Math.random()-0.5)*4000;
    positions[i*3+1] = (Math.random()-0.5)*4000;
    positions[i*3+2] = (Math.random()-0.5)*4000;
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const starMat = new THREE.PointsMaterial({ color: 0x666699, size: 1.4, transparent: true, opacity: 0.5 });
  scene.add(new THREE.Points(starGeo, starMat));
}

// edges (lignes lumineuses)
const edgeGroup = new THREE.Group();
scene.add(edgeGroup);
const edgeLines = EDGES.map(([s,t]) => {
  const a = byId[s], b = byId[t];
  const geo = new THREE.BufferGeometry().setFromPoints([a.pos, b.pos]);
  const mat = new THREE.LineBasicMaterial({ color: 0x6c7bff, transparent: true, opacity: 0.28 });
  const line = new THREE.Line(geo, mat);
  edgeGroup.add(line);
  return { line, a, b, mat };
});

// helper: étiquette texte (sprite canvas)
function makeLabelSprite(text, color) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = 256; canvas.height = 64;
  ctx.font = 'bold 30px Segoe UI, Arial';
  ctx.fillStyle = 'rgba(0,0,0,0)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#eef0ff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = color; ctx.shadowBlur = 14;
  ctx.fillText(text, canvas.width/2, canvas.height/2);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(140, 35, 1);
  return sprite;
}

// nodes (sphères)
const nodeGroup = new THREE.Group();
scene.add(nodeGroup);

NODES.forEach(n => {
  const color = APP_COLORS[n.app];
  const radius = 16 + Math.min(n.fields.length, 6) * 1.6;
  const geo = new THREE.SphereGeometry(radius, 24, 24);
  const mat = new THREE.MeshStandardMaterial({
    color, emissive: color, emissiveIntensity: 0.55,
    metalness: 0.3, roughness: 0.35,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(n.pos);
  mesh.userData.node = n;
  mesh.userData.baseScale = 1;
  nodeGroup.add(mesh);
  n.mesh = mesh;

  const glowGeo = new THREE.SphereGeometry(radius*1.6, 16, 16);
  const glowMat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.10 });
  const glow = new THREE.Mesh(glowGeo, glowMat);
  mesh.add(glow);
  n.glow = glow;

  const label = makeLabelSprite(n.id, '#'+color.toString(16).padStart(6,'0'));
  label.position.set(0, radius + 26, 0);
  mesh.add(label);

  n.pulsePhase = Math.random()*Math.PI*2;
});

/* ===========================================================
   INTERACTION : survol = tooltip + halo sur les relations
   =========================================================== */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tooltip = document.getElementById('tooltip');
let hovered = null;

function onMouseMove(e) {
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(nodeGroup.children, false);

  if (intersects.length > 0) {
    const mesh = intersects[0].object;
    if (hovered !== mesh) {
      hovered = mesh;
      const n = mesh.userData.node;
      const colorHex = '#' + APP_COLORS[n.app].toString(16).padStart(6,'0');
      tooltip.innerHTML =
        `<span class="app-tag" style="background:${colorHex}22;color:${colorHex};border:1px solid ${colorHex}66">${n.app}</span>` +
        `<h3>${n.id}</h3><ul>` +
        n.fields.map(f => `<li class="${f.startsWith('→') ? 'fk' : ''}">${f}</li>`).join('') +
        `</ul>`;
      tooltip.style.display = 'block';

      edgeLines.forEach(e => {
        const connected = e.a.id === n.id || e.b.id === n.id;
        e.mat.opacity = connected ? 0.95 : 0.08;
        e.mat.color.set(connected ? APP_COLORS[n.app] : 0x6c7bff);
      });
    }
    tooltip.style.left = (e.clientX + 18) + 'px';
    tooltip.style.top = (e.clientY + 12) + 'px';
  } else if (hovered) {
    hovered = null;
    tooltip.style.display = 'none';
    edgeLines.forEach(e => { e.mat.opacity = 0.28; e.mat.color.set(0x6c7bff); });
  }
}
window.addEventListener('mousemove', onMouseMove);

/* ===========================================================
   BOUCLE D'ANIMATION
   =========================================================== */
let clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  NODES.forEach(n => {
    const pulse = 1 + Math.sin(t*1.6 + n.pulsePhase) * 0.08;
    const hoverBoost = (hovered === n.mesh) ? 1.35 : 1;
    n.mesh.scale.setScalar(pulse * hoverBoost);
    n.glow.material.opacity = 0.07 + (Math.sin(t*1.6 + n.pulsePhase)*0.5+0.5) * 0.08;
  });

  edgeLines.forEach(e => {
    const geo = e.line.geometry;
    geo.setFromPoints([e.a.pos, e.b.pos]);
  });

  controls.update();
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

document.getElementById('loading').style.display = 'none';
animate();
</script>
</body>
</html>
